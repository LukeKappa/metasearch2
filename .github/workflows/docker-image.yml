    name: Build and Deploy Metasearch2

    on:
      push:
        branches:
          - master
          - main
      workflow_dispatch:

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    jobs:
      build-and-push:
        runs-on: ubuntu-latest
        permissions:
          contents: read
          packages: write

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v3
            with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Extract metadata for Docker
            id: meta
            uses: docker/metadata-action@v5
            with:
              images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              tags: |
                type=raw,value=latest,enable={{is_default_branch}}
                type=sha,format=short

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

          - name: Build and push Docker image
            uses: docker/build-push-action@v5
            with:
              context: .
              file: ./Dockerfile
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
              cache-from: type=gha
              cache-to: type=gha,mode=max

      trigger-coolify:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
          - name: Trigger Coolify Deployment Webhook
            env:
              COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
            run: |
              if [ -n "$COOLIFY_WEBHOOK_URL" ]; then
                echo "Sending deployment trigger to Coolify..."
                curl -s -X POST "$COOLIFY_WEBHOOK_URL" || echo "Webhook call complete."
              else
                echo "COOLIFY_WEBHOOK_URL secret is not configured. Skipping automated deploy trigger."
              fi
